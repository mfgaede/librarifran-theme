theme                    : "minimal-mistakes-jekyll"
minimal_mistakes_skin    : "contrast"
locale                   : "en-US"
title                    : "Franny Gaede"
title_separator          : "-"
subtitle                 : 
name                     : ""
url                      : https://librarifran.com
repository               : "mfgaede/librarifran-theme"
teaser                   : #path of fallback teaser
logo                     : #path of logo for masthead
masthead_title           : ""
breadcrumbs              :  false
atom_feed:
  path                   : # blank (default) uses feed.xml
  hide                   : false
search                   : true
search_full_content      : true
search_provider          : lunr
lunr:
  search_within_pages    : true
google:
  search_engine_id       : # YOUR_SEARCH_ENGINE_ID
  instant_search         : # false (default), true
# SEO Related
google_site_verification :
bing_site_verification   :
# Social Sharing
social:
  type                   : Person
# Analytics
analytics:
  provider               : false
  google:
    tracking_id          :
    anonymize_ip         : false # true, false (default)
author:
  name             : "Franny Gaede"
  avatar           : /assets/img/profile2024.jpg
  bio              : "she / her / hers"
  location         : "eugene, or"
footer:
  links:
    - label: "email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:mfgaede@gmail.com"
    - label: "website"
      icon: "fas fa-fw fa-link"
      url: "https://www.librarifran.com"
    - label: "mastodon"
      icon: "fab fa-fw fa-mastodon"
      url: "https://hcommons.social/@librarifran"
    - label: "github"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mfgaede"
# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - assets/node_modules
  - Capfile
  - CHANGELOG
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
# Outputting
pagination:
  enabled: true
  paginate_path: '/page:num/'
  collection: 'posts'
  per_page: 15
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  trail:
    before: 2
    after: 2
timezone: America/Los_Angeles
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-liquify
  - jekyll-pdf-embed
  - jekyll-linkpreview
#Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "sidebar"
      comments: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "sidebar"
      comments: false
#Comments
comments:
  provider: "custom"